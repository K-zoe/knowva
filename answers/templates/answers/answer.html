{% extends "base.html" %}
{% load static %}

{% block title %}
問題に回答 - Knowva
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'answers/css/answer.css' %}">
{% endblock %}

{% block content %}

<div class="answer-container">

    <!-- 問題進行 -->
    <div class="question-progress">
        問題
    </div>

    <!-- 問題 -->
    <div class="question-card">

        <h1 class="question-title">
            {{ question.title }}
        </h1>

        <p class="question-text">
            {{ question.text|linebreaksbr }}
        </p>

    </div>

    <form method="post" class="answer-form">
        {% csrf_token %}

        <!-- 選択肢 -->
        <div class="choices">

            {% for choice in question.choice.all %}
            <label class="choice-card">

                <div class="choice-body">

                    <input
                        type="checkbox"
                        name="choice"
                        value="{{ choice.id }}"
                        class="choice-checkbox"
                    >

                    <span class="choice-number">
                        {{ forloop.counter }}
                    </span>

                    <span class="choice-text">
                        {{ choice.text }}
                    </span>

                </div>

            </label>
            {% endfor %}

        </div>

        <!-- 回答ボタン -->
        <div class="answer-actions">
            <button type="submit" class="btn-answer">
                回答する
            </button>
        </div>

    </form>

</div>

{% endblock %}
