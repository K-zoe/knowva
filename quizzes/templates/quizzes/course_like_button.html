    <script src="https://unpkg.com/htmx.org"></script>
    <div id="like-area" class="like-container">
        <button
            class="like-btn {% if is_liked %}is-liked{% endif %}"
            hx-post="{% url 'course_like' course.uuid %}"
            hx-target="#like-area"
            hx-swap="outerHTML"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
            aria-label="いいね"
        >

            <div class="like-wrapper">
                <svg class="like-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path class="heart-outline" d="M12,21.35L10.55,20.03C5.4,15.36 2,12.27 2,8.5C2,5.41 4.42,3 7.5,3C9.24,3 10.91,3.81 12,5.08C13.09,3.81 14.76,3 16.5,3C19.58,3 22,5.41 22,8.5C22,12.27 18.6,15.36 13.45,20.03L12,21.35Z"/>
                    <path class="heart-filled" d="M12,21.35L10.55,20.03C5.4,15.36 2,12.27 2,8.5C2,5.41 4.42,3 7.5,3C9.24,3 10.91,3.81 12,5.08C13.09,3.81 14.76,3 16.5,3C19.58,3 22,5.41 22,8.5C22,12.27 18.6,15.36 13.45,20.03L12,21.35Z"/>
                </svg>
                <span class="like-count">{{ course.like_count }}</span>
            </div>
            <div class="like-particles">
                <span class="particle"></span>
                <span class="particle"></span>
                <span class="particle"></span>
                <span class="particle"></span>
                <span class="particle"></span>
            </div>
        </button>
    </div>
